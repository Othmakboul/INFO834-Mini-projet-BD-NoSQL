version: '3.8'

services:
  mongo1:
    image: mongo:latest
    container_name: mongo_primary
    command: ["--replSet", "tchat-rs", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    networks:
      - tchat_net

  mongo2:
    image: mongo:latest
    container_name: mongo_secondary
    command: ["--replSet", "tchat-rs", "--bind_ip_all", "--port", "27018"]
    ports:
      - "27018:27018"
    networks:
      - tchat_net

  mongo3:
    image: mongo:latest
    container_name: mongo_arbiter
    command: ["--replSet", "tchat-rs", "--bind_ip_all", "--port", "27019"]
    ports:
      - "27019:27019"
    networks:
      - tchat_net
networks:
  tchat_net:
    driver: bridge