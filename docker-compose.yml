version: '3.8'

services:
  redis:
    image: redis:latest
    container_name: tchat_redis
    ports:
      - "6379:6379"
    networks:
      - tchat_net

  mongo1:
    image: mongo:latest
    container_name: mongo_primary
    command: ["--replSet", "tchat-rs", "--bind_ip_all"]
    ports:
      - "27017:27017"
    networks:
      - tchat_net

  mongo2:
    image: mongo:latest
    container_name: mongo_secondary
    command: ["--replSet", "tchat-rs", "--bind_ip_all"]
    ports:
      - "27018:27017"
    networks:
      - tchat_net

  mongo3:
    image: mongo:latest
    container_name: mongo_arbiter
    command: ["--replSet", "tchat-rs", "--bind_ip_all"]
    ports:
      - "27019:27017"
    networks:
      - tchat_net

networks:
  tchat_net:
    driver: bridge